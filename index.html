<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WiFi Authenication</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .box { border: 1px solid #ccc; display: inline-block; padding: 20px; background: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Вход в гостевую сеть</h2>
        <p>Ваше устройство почти подключено...</p>
        <div id="info" style="text-align: left; color: #666; font-size: 0.8em;"></div>
    </div>

    <script>
        // 1. Собираем инфо об устройстве
        const info = document.getElementById('info');
        const data = {
            "Браузер": navigator.userAgent,
            "Язык": navigator.language,
            "Платформа": navigator.platform,
            "Память (RAM)": navigator.deviceMemory + " GB",
            "Экрана": window.screen.width + "x" + window.screen.height
        };

        // 2. Доступ к батарее
        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                data["Заряд батареи"] = (battery.level * 100) + "%";
                render(data);
            });
        } else { render(data); }

        function render(obj) {
            info.innerHTML = "<b>Обнаруженные артефакты:</b><br>";
            for (let key in obj) {
                info.innerHTML += key + ": " + obj[key] + "<br>";
            }
        }
    </script>
</body>
</html>
